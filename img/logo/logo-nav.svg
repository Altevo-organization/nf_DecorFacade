<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 52" width="260" height="52" role="img" aria-label="NF Décor Façade">

  <!-- House icon — left side, scaled to fit 50px tall -->
  <g transform="translate(0, 1)">

    <!-- Roof triangle -->
    <polygon points="25,3 47,21 3,21" fill="#C0392B"/>

    <!-- Chimney -->
    <rect x="38" y="8" width="5" height="10" rx="0.8" fill="#C0392B"/>

    <!-- House body -->
    <rect x="6" y="20" width="38" height="24" rx="1.5" fill="#C0392B"/>

    <!-- Door -->
    <rect x="18" y="31" width="10" height="13" rx="1.2" fill="#A02318"/>

    <!-- Window left -->
    <rect x="8"  y="25" width="8" height="6" rx="1" fill="#A02318"/>
    <line x1="12" y1="25" x2="12" y2="31" stroke="#C0392B" stroke-width="0.9"/>
    <line x1="8"  y1="28" x2="16" y2="28" stroke="#C0392B" stroke-width="0.9"/>

    <!-- Window right -->
    <rect x="30" y="25" width="8" height="6" rx="1" fill="#A02318"/>
    <line x1="34" y1="25" x2="34" y2="31" stroke="#C0392B" stroke-width="0.9"/>
    <line x1="30" y1="28" x2="38" y2="28" stroke="#C0392B" stroke-width="0.9"/>

    <!-- Swoosh wave (paintbrush) under house -->
    <path d="M 2,48 C 5,38 14,35 24,38 C 34,41 42,36 52,31"
      fill="none" stroke="#C0392B" stroke-width="4" stroke-linecap="round"/>
    <!-- Handle tail -->
    <path d="M 3,50 L 0,44"
      fill="none" stroke="#C0392B" stroke-width="3.5" stroke-linecap="round"/>

  </g>

  <!-- Thin vertical separator -->
  <line x1="60" y1="8" x2="60" y2="44" stroke="#C0392B" stroke-width="1.5" opacity="0.4"/>

  <!-- "NF" small label -->
  <text x="67" y="20"
    font-family="'Montserrat','Arial Black',sans-serif"
    font-size="9"
    font-weight="700"
    letter-spacing="2.5"
    fill="#C0392B"
    opacity="0.65"
  >NF</text>

  <!-- "DÉCOR FAÇADE" main text -->
  <text x="67" y="39"
    font-family="'Montserrat','Arial Black',sans-serif"
    font-size="17.5"
    font-weight="800"
    letter-spacing="0.5"
    fill="#C0392B"
  >DÉCOR FAÇADE</text>

</svg>
